global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: supreme-api
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/supreme-api-token
    static_configs:
      - targets: ['supreme-api:8000']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
