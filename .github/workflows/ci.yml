name: CI
on:
  push:
  pull_request:

jobs:
  supreme-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supreme-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e '.[dev]' prometheus-client ruff
      - run: ruff check src tests
      - run: pytest -q
      - run: docker build -t supreme-backend:ci .

  sentinela:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinela
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pytest
      - run: pytest -q
      - run: docker build -t sentinela:ci .
